services:
  - type: web
    name: Property-Analyzer
    runtime: python
    buildCommand: |
      pip install -r backend/requirements.txt &&
      cd frontend && npm install && npm run build
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.0
